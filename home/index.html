<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ログイン</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="login-page">
  <div class="login-card">
    <h2>生徒ログイン</h2>

    <input
      type="text"
      id="id"
      placeholder="ID">

    <input
      type="password"
      id="pass"
      placeholder="パスワード">

    <button
      class="btn btn-blue"
      onclick="login()">
      ログイン
    </button>

    <p id="message"></p>
  </div>

  <p class="login-link" id="staffLinkText">
    職員ログインは
    <a href="staff/index.html?from=student">コチラ</a>
    から
  </p>

  <script type="module" src="app.js"></script>
</body>
</html>
